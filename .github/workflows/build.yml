name: "Build"
on:
  pull_request:
  push:
jobs:
  build:
    strategy:
      matrix:
        font:
          - normal
          - term
          - mono
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v14
        with:
          name: star122013
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix build --extra-experimental-features "nix-command flakes" --print-out-paths .#${{ matrix.font }} | tee /dev/stderr | cachix push star122013
